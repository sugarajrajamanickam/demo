services:
  app:
    build: .
    image: demo-app:latest
    ports:
      - "8000:8000"
    environment:
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret-change-me}
      APP_TOKEN_EXPIRE_MINUTES: ${APP_TOKEN_EXPIRE_MINUTES:-60}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-*}
    restart: unless-stopped
